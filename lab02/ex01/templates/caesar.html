<!DOCTYPE html>
<html lang="en">
<head>
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <table class="table">
            <!-- Tiêu đề -->
            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">CAESAR CIPHER</td>
            </tr>

            <!-- Phần mã hóa -->
            <tr>
                <td style="font-weight: bold; color: blue;">ENCRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form id="encryptForm" method="POST" action="caesar/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input id="encryptPlain" type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input id="encryptKey" type="number" class="form-control" name="inputKeyPlain" placeholder="Input Key" required>
                        </div>
                        <button id="encryptBtn" type="submit" class="btn btn-primary">Encrypt</button>
                        <div class="mt-3">
                            <label class="form-label">Result:</label>
                            <input id="encryptResult" type="text" class="form-control" readonly placeholder="Encrypted text will appear here">
                        </div>
                    </form>
                </td>
            </tr>

            <!-- Phần giải mã -->
            <tr>
                <td style="font-weight: bold; color: blue;">DECRYPTION</td>
            </tr>
            <tr>
                <td>
                    <form id="decryptForm" method="POST" action="caesar/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input id="decryptCipher" type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input id="decryptKey" type="number" class="form-control" name="inputKeyCipher" placeholder="Input Key" required>
                        </div>
                        <button id="decryptBtn" type="submit" class="btn btn-primary">Decrypt</button>
                        <div class="mt-3">
                            <label class="form-label">Result:</label>
                            <input id="decryptResult" type="text" class="form-control" readonly placeholder="Decrypted text will appear here">
                        </div>
</form>
                </td>
            </tr>
        </table>
    </div>

    <script>
        // Utility: perform Caesar shift on alphabetic characters, preserve case
        function caesarShift(text, shift) {
            if (!shift || isNaN(shift)) return text;
            shift = parseInt(shift, 10) % 26;
            var result = '';
            for (var i = 0; i < text.length; i++) {
                var c = text.charCodeAt(i);
                // uppercase A-Z
                if (c >= 65 && c <= 90) {
                    result += String.fromCharCode(((c - 65 + shift + 26) % 26) + 65);
                }
                // lowercase a-z
                else if (c >= 97 && c <= 122) {
                    result += String.fromCharCode(((c - 97 + shift + 26) % 26) + 97);
                } else {
                    // leave other characters unchanged
                    result += text.charAt(i);
                }
            }
            return result;
        }

        // Encrypt form handler
        document.getElementById('encryptForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var plain = document.getElementById('encryptPlain').value || '';
            var key = parseInt(document.getElementById('encryptKey').value, 10);
            if (isNaN(key)) {
                document.getElementById('encryptResult').value = 'Invalid key';
                return;
            }
            var cipher = caesarShift(plain, key);
            document.getElementById('encryptResult').value = cipher;
        });

        // Decrypt form handler (shift backwards)
        document.getElementById('decryptForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var cipher = document.getElementById('decryptCipher').value || '';
            var key = parseInt(document.getElementById('decryptKey').value, 10);
            if (isNaN(key)) {
                document.getElementById('decryptResult').value = 'Invalid key';
                return;
            }
            var plain = caesarShift(cipher, -key);
            document.getElementById('decryptResult').value = plain;
        });
    </script>
</body>
</html>
